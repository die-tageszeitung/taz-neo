query IssueVersionByFeedAndDateQuery($feedName: String, $issueDate: String!) {
    product {
        feedList(name: $feedName) {
            issueList(issueDate: $issueDate, limit: 1) {
                date,
                moment {
                    imageList {
                        name
                        storageType
                        moTime
                        sha256
                        size
                        resolution
                        type
                        alpha
                    }
                    creditList {
                        name
                        storageType
                        moTime
                        sha256
                        size
                        resolution
                        type
                        alpha
                    }
                    momentList {
                        name
                        storageType
                        moTime
                        sha256
                        size
                    }
                    duration
                },
                baseUrl,
                status,
                minResourceVersion,
                moTime,
                version
            }
        }
    }
}