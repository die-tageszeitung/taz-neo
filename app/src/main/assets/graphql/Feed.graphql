query FeedQuery($name: String) {
    product {
        authInfo {
            status
            message
        }
        feedList(name: $name) {
            name
            displayName
            cycle
            momentRatio
            publicationDates
            issueCnt
            issueMaxDate
            issueMinDate
            validityDates {
                date
                validityDate
            }
        }
    }
}